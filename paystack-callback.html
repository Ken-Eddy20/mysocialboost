<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Completing payment…</title>
    <link rel="stylesheet" href="/css/style.css" />
    <style>
        body { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
        .cb-box { text-align: center; max-width: 400px; }
        .cb-box p { color: var(--muted); margin-top: 12px; }
    </style>
</head>
<body>
    <div class="cb-box">
        <h2 style="font-family: var(--font-h); color: var(--cyan);">Completing payment…</h2>
        <p>Please wait while we confirm your transaction with Paystack.</p>
    </div>
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js';
        import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js';

        const app = initializeApp({
            apiKey: 'AIzaSyAjQ2REuJCfGo0-VQ1cO_X7fxrT2-GEWYQ',
            authDomain: 'mysocialboost-a23f2.firebaseapp.com',
            projectId: 'mysocialboost-a23f2',
            storageBucket: 'mysocialboost-a23f2.firebasestorage.app',
            messagingSenderId: '454490141951',
            appId: '1:454490141951:web:776c4d9ccd789bbae248ca',
        });
        const auth = getAuth(app);

        const params = new URLSearchParams(window.location.search);
        const reference = params.get('reference') || params.get('trxref');

        if (!reference) {
            window.location.replace('/?wallet_topup=fail&msg=' + encodeURIComponent('Missing payment reference from Paystack.'));
        } else {
            const waitForAuth = () => new Promise((resolve) => {
                let done = false;
                const unsub = onAuthStateChanged(auth, (user) => {
                    if (!done) { done = true; unsub(); resolve(user); }
                });
                setTimeout(() => { if (!done) { done = true; unsub(); resolve(null); } }, 5000);
            });

            try {
                const fbUser = await waitForAuth();
                const idToken = fbUser ? await fbUser.getIdToken() : null;

                const headers = { 'Content-Type': 'application/json', Accept: 'application/json' };
                if (idToken) headers['Authorization'] = `Bearer ${idToken}`;

                const res = await fetch('/api/add-funds', {
                    method: 'POST',
                    headers,
                    body: JSON.stringify({ reference }),
                });
                const data = await res.json().catch(() => ({}));
                if (data.success) {
                    window.location.replace('/?wallet_topup=success');
                } else {
                    window.location.replace(
                        '/?wallet_topup=fail&msg=' + encodeURIComponent(data.message || 'Could not confirm payment.')
                    );
                }
            } catch (e) {
                window.location.replace(
                    '/?wallet_topup=fail&msg=' + encodeURIComponent('Network error. If you were charged, contact support with your Paystack reference.')
                );
            }
        }
    </script>
</body>
</html>
